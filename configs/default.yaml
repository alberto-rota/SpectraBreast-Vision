# MASt3R-SfM + ArUco: load with `spectra run --config configs/default.yaml`
# Input: folder of images. Optional: `pose_dir`, `camera_params_dir` (or both null for SfM-only).
# Output: fused `cloud.ply`, ArUco 2D under `aruco_detections/`, 3D in `aruco_markers_3d.json` when aligned.

input:
  rgb_dir: DATA/SAMPLE1_iphone/rgb
  pose_dir: null
  camera_params_dir: null

output:
  root: RESULTS
  run_name: SCRAP
  update_most_recent_symlink: true
  z_axis_points_down: true

aruco:
  dictionary: 4x4_50
  marker_edge_length_m: 0.068
  origin_marker_id: null
  min_views_per_marker: 2
  align_to_aruco: true
  max_sim3_scale_deviation_when_poses_known: 0.05
  detection_draw_scale: 2.0
  bundle_adjustment: false
  ba_max_iters: 1000
  ba_lr: 0.005
  ba_huber_delta_px: 2.0
  ba_cam_prior_sigma_m: 0.10
  ba_cam_prior_sigma_deg: 5.0
  reject_views_by_alignment_error: false
  max_view_alignment_reproj_rmse_px: 15.0
  min_kept_views: 2
  reject_views_with_no_markers: false

surface:
  grid_step: 0.0
  fill_iters: 2
  smooth_iters: 1
  min_neighbors: 3
  max_resolution: 2048
  conf_threshold_percentile: 50.0

mast3r:
  model_name: naver/MASt3R_ViTLarge_BaseDecoder_512_catmlpdpt_metric
  pipeline_variant: sfm
  scene_graph: auto
  retrieval_model: null
  sfm_subsample: 4
  sfm_lr1: 0.07
  sfm_niter1: 300
  sfm_lr2: 0.01
  sfm_niter2: 300
  sfm_opt_depth: true
  sfm_shared_intrinsics: true
  sfm_matching_conf_thr: 5.0
  sfm_min_conf_thr: 1.5
  sfm_clean_depth: true
  image_size: 512
  neighbor_window: 2
  desc_conf_thr: 0.1
  dense_conf_thr: 12.0
  voxel_size: 0.0015
  max_points: 2000000
  pixel_tol: 1.5
  max_matches_per_pair: 50000
  pose_refine_iters: 1
  pose_refine_lr: 0.0
  pose_refine_lr_min: 0.00001
  pose_prior_sigma_deg: 1.0
  pose_prior_sigma_m: 0.01
  pose_prior_weight: 0.06
  pose_refine_log_every: 25
  pose_refine_max_drot_deg: 8.0
  pose_refine_max_dt_m: 0.06
  dense_refine_iters: 1
  dense_refine_lr: 0.0
  confidence_percentile: 99.0

rerun:
  enabled: true
  grpc_port: 9876
  no_wait: true
  log_cloud_rgb: true
  log_cloud_confidence: false
  log_cameras: false
  log_camera_aruco_images: false
  log_camera_confidence_images: false
  log_aruco_3d: true
  log_surface_mesh: false
  log_surface_cloud_open3d_web: false
  open3d_web_visualizer_port: 8888
  open3d_web_show_ui: false
  pointcloud_resample_factor: 0.25
  save_rrd: true
  save_rbl: true
  rerun_subdir: rerun
  rrd_basename: spectra.rrd
  rbl_basename: spectra.rbl
